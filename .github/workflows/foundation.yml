name: foundation-terraform

on:
  workflow_dispatch:
    inputs:
      apply:
        description: "Set to true to apply the foundation stack"
        required: true
        default: "false"

permissions:
  id-token: write
  contents: read

jobs:
  foundation:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: examples/foundation/environments/dev
    env:
      AWS_REGION: ${{ vars.AWS_REGION }}
      TF_STATE_BUCKET: ${{ vars.TF_STATE_BUCKET }}
      TF_LOCK_TABLE: ${{ vars.TF_LOCK_TABLE }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform fmt
        run: terraform fmt -check -recursive

      - name: Terraform init
        run: >
          terraform init
          -backend-config="bucket=${TF_STATE_BUCKET}"
          -backend-config="key=foundation/dev/terraform.tfstate"
          -backend-config="region=${AWS_REGION}"
          -backend-config="dynamodb_table=${TF_LOCK_TABLE}"

      - name: Terraform validate
        run: terraform validate

      - name: Terraform plan
        run: terraform plan -out=tfplan

      - name: Terraform apply
        if: ${{ github.event.inputs.apply == 'true' }}
        run: terraform apply -auto-approve tfplan
